<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dhawath — Staff Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C8922A;--gold-light:#E8B84B;--gold-pale:#FBF3E3;--dark:#1A1208;--ink:#2C1F0A;--muted:#7A6A4F;--cream:#FAF6EF;--white:#FFFFFF;--border:#E8DEC8;--danger:#A32D2D}
body{font-family:'DM Sans',sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--white);border-radius:20px;padding:40px 36px;max-width:400px;width:100%;border:2px solid var(--gold);text-align:center}
.logo-mark{width:70px;height:70px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-family:'Playfair Display',serif;color:var(--dark);font-weight:700;margin:0 auto 16px}
h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--dark);margin-bottom:4px}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:30px}
.role-tabs{display:flex;gap:8px;margin-bottom:24px}
.role-tab{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);background:var(--cream);transition:all 0.18s}
.role-tab.active{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.field{text-align:left;margin-bottom:16px}
.field label{font-size:11px;color:var(--muted);font-weight:500;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
.field input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;color:var(--ink);background:var(--cream)}
.field input:focus{border-color:var(--gold)}
.login-btn{width:100%;background:var(--gold);color:var(--dark);border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;transition:background 0.18s}
.login-btn:hover{background:var(--gold-light)}
.error{color:var(--danger);font-size:12px;margin-top:10px;display:none}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.customer-link{font-size:13px;color:var(--muted)}
.customer-link a{color:var(--gold);text-decoration:none;font-weight:500}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(26,18,8,0.2);border-top-color:var(--dark);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo-mark">م</div>
  <h1>My Dhawath</h1>
  <p class="subtitle">Staff Portal — Sign in to continue</p>

  <div class="role-tabs">
    <button class="role-tab active" onclick="setRole('admin',this)">👑 Admin</button>
    <button class="role-tab" onclick="setRole('kitchen',this)">👨‍🍳 Kitchen</button>
    <button class="role-tab" onclick="setRole('waiter',this)">🛎️ Waiter</button>
  </div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="staff@dhawath.com">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  </div>

  <button class="login-btn" onclick="login()" id="login-btn">Sign In</button>
  <div class="error" id="error-msg"></div>

  <hr class="divider">
  <p class="customer-link">Customer ordering? <a href="index.html">Go to Menu →</a></p>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAUV8uk7hdxJKh75SlHukoohTtQ1Wd_qLk",
  authDomain: "dhawath-restaurant.firebaseapp.com",
  projectId: "dhawath-restaurant",
  storageBucket: "dhawath-restaurant.firebasestorage.app",
  messagingSenderId: "896647998152",
  appId: "1:896647998152:web:472c242233b07eea53d3fd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let selectedRole = 'admin';

window.setRole = function(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
};

window.login = async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  err.style.display = 'none';
  if (!email || !password) { err.textContent = 'Please enter email and password.'; err.style.display = 'block'; return; }
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  btn.disabled = true;
  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    localStorage.setItem('dhawath_role', selectedRole);
    localStorage.setItem('dhawath_uid', cred.user.uid);
    localStorage.setItem('dhawath_email', email);
    if (selectedRole === 'admin') window.location.href = 'admin.html';
    else if (selectedRole === 'kitchen') window.location.href = 'admin.html#kitchen';
    else window.location.href = 'index.html';
  } catch(e) {
    err.textContent = e.code === 'auth/invalid-credential' ? 'Invalid email or password.' : e.message;
    err.style.display = 'block';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
