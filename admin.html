<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dhawath — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C8922A;--gold-light:#E8B84B;--gold-pale:#FBF3E3;--dark:#1A1208;--ink:#2C1F0A;--muted:#7A6A4F;--cream:#FAF6EF;--white:#FFFFFF;--border:#E8DEC8;--danger:#A32D2D;--success:#2D7A4F}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}

/* HEADER */
.header{background:var(--dark);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-family:'Playfair Display',serif;color:var(--dark);font-weight:700}
.logo-text h1{font-family:'Playfair Display',serif;font-size:16px;color:#fff;line-height:1.1}
.logo-text p{font-size:10px;color:var(--gold-light);letter-spacing:1.5px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:10px}
.live-badge{background:rgba(29,158,117,0.2);border:1px solid #1D9E75;color:#5DCAA5;padding:4px 10px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#5DCAA5;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.logout-btn{background:none;border:1px solid rgba(200,146,42,0.4);color:var(--gold-light);padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.logout-btn:hover{background:rgba(200,146,42,0.1)}

/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:90;overflow-x:auto}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px;background:var(--white);border-bottom:1px solid var(--border)}
@media(max-width:600px){.stats-bar{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--cream);border-radius:10px;padding:12px 14px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.stat-value{font-size:22px;font-weight:600;font-family:'Playfair Display',serif;color:var(--dark)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* VIEWS */
.view{display:none;padding:16px 20px;min-height:calc(100vh - 200px)}
.view.active{display:block}
.view-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.view-header h2{font-family:'Playfair Display',serif;font-size:20px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s}
.filter-btn.active,.filter-btn:hover{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ORDER CARDS */
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.order-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.order-card.urgent{border-left:3px solid var(--danger)}
.oc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.oc-num{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold)}
.oc-table{font-size:12px;color:var(--muted);background:var(--cream);padding:3px 9px;border-radius:10px}
.status-badge{font-size:10px;padding:3px 9px;border-radius:11px;font-weight:500}
.s-pending{background:#FBF3E3;color:#854F0B}
.s-preparing{background:#E6F1FB;color:#185FA5}
.s-ready{background:#EAF3DE;color:#3B6D11}
.s-served{background:#F1EFE8;color:#5F5E5A}
.s-cancelled{background:#FCEBEB;color:#A32D2D}
.oc-items{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.7}
.oc-item-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)}
.oc-item-row:last-child{border:none}
.oc-special{font-size:11px;color:#185FA5;background:#E6F1FB;padding:5px 9px;border-radius:6px;margin:8px 0}
.oc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.oc-total{font-size:14px;font-weight:600;color:var(--dark)}
.oc-time{font-size:10px;color:var(--muted)}
.status-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.s-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--muted);transition:all 0.15s}
.s-btn:hover{border-color:var(--gold);color:var(--gold)}
.s-btn.active{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.s-btn.cancel{color:var(--danger);border-color:var(--danger)}
.s-btn.cancel:hover,.s-btn.cancel.active{background:var(--danger);color:#fff}
.no-orders{text-align:center;padding:48px;color:var(--muted)}
.no-orders .ni{font-size:40px;margin-bottom:12px}

/* MENU MANAGEMENT */
.menu-section{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.menu-section-header{padding:12px 16px;background:var(--cream);border-bottom:1px solid var(--border);font-family:'Playfair Display',serif;font-size:16px;display:flex;justify-content:space-between;align-items:center}
.menu-item-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.menu-item-row:last-child{border:none}
.mi-emoji{font-size:22px;width:36px;text-align:center}
.mi-info{flex:1}
.mi-name{font-size:13px;font-weight:500}
.mi-price{font-size:12px;color:var(--gold);font-weight:600}
.mi-toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.mi-toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:22px;cursor:pointer;transition:0.3s}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s}
input:checked+.toggle-slider{background:var(--gold)}
input:checked+.toggle-slider:before{transform:translateX(18px)}

/* TABLE STATUS */
.tables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.table-card{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all 0.18s}
.table-card.occupied{border-color:var(--gold);background:var(--gold-pale)}
.table-card.ready{border-color:var(--success);background:#EAF3DE}
.table-card.available{border-color:var(--border)}
.table-num{font-family:'Playfair Display',serif;font-size:28px;color:var(--dark);margin-bottom:4px}
.table-status{font-size:11px;font-weight:500;color:var(--muted)}
.table-card.occupied .table-status{color:var(--gold)}
.table-card.ready .table-status{color:var(--success)}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(200,146,42,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">م</div>
    <div class="logo-text"><h1>My Dhawath</h1><p>Admin Dashboard</p></div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div><span>Live</span></div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showView('kitchen',this)">🍳 Kitchen</div>
  <div class="tab" onclick="showView('all-orders',this)">📋 All Orders</div>
  <div class="tab" onclick="showView('tables',this)">🪑 Tables</div>
  <div class="tab" onclick="showView('menu-mgmt',this)">📜 Menu</div>
  <div class="tab" onclick="window.location.href='reports.html'">📊 Reports</div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-card"><div class="stat-label">Today's Orders</div><div class="stat-value" id="stat-orders">—</div></div>
  <div class="stat-card"><div class="stat-label">Today's Revenue</div><div class="stat-value" id="stat-revenue">—</div></div>
  <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" id="stat-pending">—</div></div>
  <div class="stat-card"><div class="stat-label">Tables Active</div><div class="stat-value" id="stat-tables">—</div></div>
</div>

<!-- KITCHEN VIEW -->
<div class="view active" id="view-kitchen">
  <div class="view-header">
    <h2>Kitchen Orders</h2>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="filter-row" id="kitchen-filters">
        <button class="filter-btn active" onclick="filterKitchen('all',this)">All</button>
        <button class="filter-btn" onclick="filterKitchen('pending',this)">Pending</button>
        <button class="filter-btn" onclick="filterKitchen('preparing',this)">Preparing</button>
        <button class="filter-btn" onclick="filterKitchen('ready',this)">Ready</button>
      </div>
    </div>
  </div>
  <div class="orders-grid" id="kitchen-orders"><div class="no-orders"><div class="ni">👨‍🍳</div><p>Loading orders...</p></div></div>
</div>

<!-- ALL ORDERS -->
<div class="view" id="view-all-orders">
  <div class="view-header">
    <h2>All Orders</h2>
    <button class="refresh-btn" onclick="loadAllOrders()">↻ Refresh</button>
  </div>
  <div id="all-orders-list"><div class="no-orders"><p>Loading...</p></div></div>
</div>

<!-- TABLES -->
<div class="view" id="view-tables">
  <div class="view-header"><h2>Table Status</h2><button class="refresh-btn" onclick="loadTables()">↻ Refresh</button></div>
  <div class="tables-grid" id="tables-grid"></div>
</div>

<!-- MENU MANAGEMENT -->
<div class="view" id="view-menu-mgmt">
  <div class="view-header"><h2>Menu Management</h2><span style="font-size:12px;color:var(--muted)">Toggle to enable/disable items</span></div>
  <div id="menu-list"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, query, orderBy, getDocs, doc, updateDoc, onSnapshot, where, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAUV8uk7hdxJKh75SlHukoohTtQ1Wd_qLk",
  authDomain: "dhawath-restaurant.firebaseapp.com",
  projectId: "dhawath-restaurant",
  storageBucket: "dhawath-restaurant.firebasestorage.app",
  messagingSenderId: "896647998152",
  appId: "1:896647998152:web:472c242233b07eea53d3fd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const MENU = [
  {cat:'Starters',items:[
    {id:1,name:'Mutton Seekh Kebab',price:320,emoji:'🥩'},{id:2,name:'Chicken Shami Kebab',price:260,emoji:'🍗'},
    {id:3,name:'Veg Crispy Corn',price:180,emoji:'🌽'},{id:4,name:'Paneer Tikka',price:240,emoji:'🧀'},{id:5,name:'Fish Amritsari',price:340,emoji:'🐟'}]},
  {cat:'Biryani',items:[
    {id:6,name:'Hyderabadi Dum Biryani',price:380,emoji:'🍚'},{id:7,name:'Chicken Biryani',price:320,emoji:'🍛'},
    {id:8,name:'Veg Biryani',price:240,emoji:'🌿'},{id:9,name:'Prawn Biryani',price:420,emoji:'🦐'}]},
  {cat:'Curries',items:[
    {id:10,name:'Butter Chicken',price:300,emoji:'🍲'},{id:11,name:'Rogan Josh',price:360,emoji:'🥘'},
    {id:12,name:'Dal Makhani',price:220,emoji:'🫘'},{id:13,name:'Palak Paneer',price:240,emoji:'🍃'},{id:14,name:'Prawn Masala',price:380,emoji:'🦐'}]},
  {cat:'Breads',items:[
    {id:15,name:'Butter Naan',price:60,emoji:'🫓'},{id:16,name:'Garlic Roti',price:55,emoji:'🫓'},
    {id:17,name:'Paratha',price:70,emoji:'🫓'},{id:18,name:'Laccha Paratha',price:80,emoji:'🫓'}]},
  {cat:'Beverages',items:[
    {id:19,name:'Mango Lassi',price:120,emoji:'🥭'},{id:20,name:'Masala Chai',price:60,emoji:'☕'},
    {id:21,name:'Fresh Lime Soda',price:80,emoji:'🍋'},{id:22,name:'Rose Sharbat',price:100,emoji:'🌹'}]},
  {cat:'Desserts',items:[
    {id:23,name:'Gulab Jamun',price:120,emoji:'🍮'},{id:24,name:'Phirni',price:140,emoji:'🥣'},{id:25,name:'Double Ka Meetha',price:160,emoji:'🍞'}]}
];

let allOrders = [], kitchenFilter = 'all';

// Auth check
onAuthStateChanged(auth, user => {
  if (!user) window.location.href = 'login.html';
  else { startLive(); loadTables(); buildMenuMgmt(); }
});

// Live kitchen listener
function startLive() {
  const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
  onSnapshot(q, snap => {
    allOrders = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
    renderKitchen();
    updateStats();
  });
}

function renderKitchen() {
  const el = document.getElementById('kitchen-orders');
  const filtered = kitchenFilter === 'all'
    ? allOrders.filter(o => o.status !== 'served' && o.status !== 'cancelled' && o.status !== 'paid' && o.status !== 'pending-payment')
    : allOrders.filter(o => o.status === kitchenFilter);
  if (!filtered.length) { el.innerHTML = '<div class="no-orders"><div class="ni">✅</div><p>No orders in this category.</p></div>'; return; }
  el.innerHTML = filtered.map(o => renderCard(o, true)).join('');
}

function updateStats() {
  const today = new Date().toDateString();
  const todayOrders = allOrders.filter(o => o.orderedAt && new Date(o.orderedAt).toDateString() === today);
  const paidOrders = todayOrders.filter(o => o.status === 'paid');
  const revenue = paidOrders.reduce((a, o) => a + (o.total || 0), 0);
  const pending = allOrders.filter(o => o.status === 'pending').length;
  const tables = [...new Set(allOrders.filter(o => o.status !== 'served').map(o => o.tableNumber))].length;
  document.getElementById('stat-orders').textContent = todayOrders.length;
  document.getElementById('stat-revenue').textContent = '₹' + revenue.toLocaleString();
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-tables').textContent = tables;
}

window.loadAllOrders = async function() {
  const el = document.getElementById('all-orders-list');
  el.innerHTML = '<div class="no-orders"><p>Loading...</p></div>';
  const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
  const snap = await getDocs(q);
  if (snap.empty) { el.innerHTML = '<div class="no-orders"><p>No orders yet.</p></div>'; return; }
  el.innerHTML = snap.docs.map(d => renderCard({ ...d.data(), _id: d.id }, true)).join('');
};

window.loadTables = function() {
  const grid = document.getElementById('tables-grid');
  grid.innerHTML = '';
  const occupiedTables = [...new Set(allOrders.filter(o => o.status !== 'served' && o.status !== 'cancelled').map(o => o.tableNumber))];
  const readyTables = [...new Set(allOrders.filter(o => o.status === 'ready').map(o => o.tableNumber))];
  for (let i = 1; i <= 16; i++) {
    const t = String(i);
    const isReady = readyTables.includes(t);
    const isOccupied = occupiedTables.includes(t);
    const cls = isReady ? 'ready' : isOccupied ? 'occupied' : 'available';
    const statusText = isReady ? '🔔 Food Ready' : isOccupied ? '🍽️ Occupied' : '✓ Available';
    const div = document.createElement('div');
    div.className = 'table-card ' + cls;
    div.innerHTML = `<div class="table-num">${i}</div><div class="table-status">${statusText}</div>`;
    grid.appendChild(div);
  }
};

function buildMenuMgmt() {
  const el = document.getElementById('menu-list');
  el.innerHTML = MENU.map(section => `
    <div class="menu-section">
      <div class="menu-section-header">${section.cat}</div>
      ${section.items.map(item => `
        <div class="menu-item-row">
          <div class="mi-emoji">${item.emoji}</div>
          <div class="mi-info"><div class="mi-name">${item.name}</div><div class="mi-price">₹${item.price}</div></div>
          <label class="mi-toggle"><input type="checkbox" checked onchange="toggleItem(${item.id},this.checked)"><span class="toggle-slider"></span></label>
        </div>`).join('')}
    </div>`).join('');
}

window.toggleItem = function(id, enabled) {
  console.log('Item', id, enabled ? 'enabled' : 'disabled');
};

function renderCard(o, editable) {
  const sMap = { pending: 's-pending', preparing: 's-preparing', ready: 's-ready', served: 's-served', cancelled: 's-cancelled' };
  const statuses = ['pending', 'preparing', 'ready', 'served'];
  const time = o.orderedAt ? new Date(o.orderedAt).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) : '—';
  const isUrgent = o.status === 'pending' && o.orderedAt && (Date.now() - new Date(o.orderedAt).getTime()) > 10 * 60 * 1000;
  const itemRows = o.items ? o.items.map(i => `<div class="oc-item-row"><span>${i.emoji||''} ${i.name} ×${i.qty}</span><span>₹${i.lineTotal||i.price*i.qty}</span></div>`).join('') : '';
  const special = o.specialRequest ? `<div class="oc-special">📝 ${o.specialRequest}</div>` : '';
  const statusBtns = editable ? `
    <div class="status-btns">
      ${statuses.map(s => `<button class="s-btn${o.status===s?' active':''}" onclick="setStatus('${o._id}','${s}')">${s}</button>`).join('')}
      <button class="s-btn cancel${o.status==='cancelled'?' active':''}" onclick="setStatus('${o._id}','cancelled')">cancel</button>
    </div>` : '';
  return `<div class="order-card${isUrgent?' urgent':''}">
    <div class="oc-top">
      <span class="oc-num">${o.orderNumber||'#'+o._id.slice(-4)}</span>
      <span class="oc-table">Table ${o.tableNumber}</span>
      <span class="status-badge ${sMap[o.status]||'s-pending'}">${o.status||'pending'}</span>
    </div>
    ${itemRows}
    ${special}
    <div class="oc-footer"><span class="oc-total">₹${o.total}</span><span class="oc-time">${time}${isUrgent?' ⚠️ Urgent':''}</span></div>
    ${statusBtns}
  </div>`;
}

window.setStatus = async function(id, status) {
  try { await updateDoc(doc(db, 'orders', id), { status }); }
  catch(e) { alert('Error: ' + e.message); }
};

window.filterKitchen = function(f, el) {
  kitchenFilter = f;
  document.querySelectorAll('#kitchen-filters .filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderKitchen();
};

window.showView = function(view, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  el.classList.add('active');
  if (view === 'all-orders') loadAllOrders();
  if (view === 'tables') loadTables();
};

window.logout = async function() {
  await signOut(auth);
  window.location.href = 'login.html';
};

// Check hash for direct kitchen link
if (window.location.hash === '#kitchen') {
  document.querySelectorAll('.tab')[0].click();
}
</script>
</body>
</html>
